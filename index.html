<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Steganography</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #5bc0be;
      --primary-dark: #3a506b;
      --secondary: #6fffe9;
      --dark: #0b132b;
      --darker: #050a1a;
      --light: #ffffff;
      --container-bg: rgba(28, 37, 65, 0.85);
      --shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: var(--darker);
      color: var(--light);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    #video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      opacity: 0.6;
      filter: brightness(0.7);
    }
    
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, rgba(5, 10, 26, 0.8) 0%, rgba(11, 19, 43, 0.7) 100%);
      z-index: -1;
    }
    
    .container {
      background: var(--container-bg);
      padding: 30px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      width: 90%;
      max-width: 600px;
      text-align: center;
      margin: 40px auto;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: fadeInUp 0.8s ease-out;
      position: relative;
      overflow: hidden;
    }
    
    .container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(91, 192, 190, 0.1) 0%, rgba(28, 37, 65, 0) 70%);
      z-index: 0;
    }
    
    .container > * {
      position: relative;
      z-index: 1;
    }
    
    h1 {
      margin-bottom: 5px;
      font-size: 2.5rem;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 15px rgba(91, 192, 190, 0.3);
      animation: glow 2s infinite alternate;
    }
    
    .subtitle {
      color: var(--secondary);
      margin-bottom: 20px;
      font-size: 1.1rem;
      font-weight: 300;
    }
    
    .tab-bar {
      margin: 25px 0;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    
    .tab {
      background: var(--primary-dark);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-weight: 600;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    
    .tab::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
      z-index: -1;
    }
    
    .tab:hover::before {
      left: 100%;
    }
    
    .tab:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(91, 192, 190, 0.4);
    }
    
    .tab.active {
      background: var(--primary);
      color: var(--dark);
      box-shadow: 0 0 15px rgba(91, 192, 190, 0.5);
    }
    
    .content {
      display: none;
      animation: fadeIn 0.5s ease-out;
    }
    
    .content.active {
      display: block;
    }
    
    .preview-container {
      position: relative;
      margin: 20px auto;
      width: 100%;
      max-width: 300px;
      height: 200px;
      border-radius: 15px;
      overflow: hidden;
      background: rgba(11, 19, 43, 0.5);
      border: 2px dashed var(--primary-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    
    .preview-container:hover {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(91, 192, 190, 0.3);
    }
    
    .preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      border-radius: 13px;
    }
    
    .preview-placeholder {
      text-align: center;
      color: var(--secondary);
    }
    
    .preview-placeholder i {
      font-size: 3rem;
      margin-bottom: 10px;
      display: block;
    }
    
    .file-input {
      display: none;
    }
    
    .file-label {
      display: block;
      background: var(--primary-dark);
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 15px auto;
      width: 90%;
      max-width: 300px;
    }
    
    .file-label:hover {
      background: var(--primary);
      color: var(--dark);
      transform: translateY(-2px);
    }
    
    textarea {
      width: 90%;
      height: 120px;
      margin-top: 10px;
      border-radius: 12px;
      border: 2px solid var(--primary-dark);
      padding: 15px;
      resize: none;
      font-size: 16px;
      background: rgba(11, 19, 43, 0.5);
      color: var(--light);
      transition: all 0.3s ease;
    }
    
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(91, 192, 190, 0.5);
    }
    
    button {
      background: var(--primary);
      color: var(--dark);
      border: none;
      padding: 15px 30px;
      border-radius: 50px;
      margin-top: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    
    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.5s;
      z-index: -1;
    }
    
    button:hover::before {
      left: 100%;
    }
    
    button:hover {
      background: var(--secondary);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(111, 255, 233, 0.4);
    }
    
    button:active {
      transform: translateY(1px);
    }
    
    #decodedMsg {
      font-size: 16px;
      margin-top: 20px;
      word-wrap: break-word;
      padding: 15px;
      background: rgba(11, 19, 43, 0.5);
      border-radius: 12px;
      border-left: 4px solid var(--primary);
      animation: fadeIn 0.5s ease-out;
    }
    
    .pulse {
      animation: pulse 2s infinite;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    @keyframes glow {
      from {
        text-shadow: 0 0 5px rgba(91, 192, 190, 0.5);
      }
      to {
        text-shadow: 0 0 15px rgba(91, 192, 190, 0.8), 0 0 20px rgba(91, 192, 190, 0.6);
      }
    }
    
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(91, 192, 190, 0.7);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(91, 192, 190, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(91, 192, 190, 0);
      }
    }
    
    .floating {
      animation: floating 3s ease-in-out infinite;
    }
    
    @keyframes floating {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
      100% {
        transform: translateY(0px);
      }
    }
    
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
    }
    
    .particle {
      position: absolute;
      background: rgba(91, 192, 190, 0.5);
      border-radius: 50%;
      animation: floatParticle linear infinite;
    }
    
    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
      }
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 20px;
        margin: 20px auto;
      }
      
      h1 {
        font-size: 2rem;
      }
      
      .tab-bar {
        flex-direction: column;
        align-items: center;
      }
      
      .tab {
        width: 90%;
        margin-bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <!-- Video Background -->
  <video id="video-bg" autoplay muted loop>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-digital-wireframe-flow-129-large.mp4" type="video/mp4">
  </video>
  
  <!-- Overlay -->
  <div class="overlay"></div>
  
  <!-- Floating Particles -->
  <div class="particles" id="particles"></div>
  
  <!-- Main Content -->
  <div class="container">
    <h1 class="floating">🕵️‍♂️ Image Steganography</h1>
    <p class="subtitle">By Zain Qureshi</p>

    <div class="tab-bar">
      <button id="encodeTab" class="tab active">Encode</button>
      <button id="decodeTab" class="tab">Decode</button>
    </div>

    <!-- Encode section -->
    <div id="encodeSection" class="content active">
      <h2>Encode Message into Image</h2>
      
      <input type="file" id="encodeImage" class="file-input" accept="image/*">
      <label for="encodeImage" class="file-label">
        <i class="fas fa-cloud-upload-alt"></i> Choose Image
      </label>
      
      <div class="preview-container">
        <div id="encodePlaceholder" class="preview-placeholder">
          <i class="fas fa-image"></i>
          <p>Image Preview</p>
        </div>
        <img id="encodePreview" class="preview" />
      </div>
      
      <textarea id="secretText" placeholder="Enter your secret message here..."></textarea>
      <button id="encodeBtn" class="pulse">
        <i class="fas fa-lock"></i> Encode & Download
      </button>
    </div>

    <!-- Decode section -->
    <div id="decodeSection" class="content">
      <h2>Decode Hidden Message</h2>
      
      <input type="file" id="decodeImage" class="file-input" accept="image/*">
      <label for="decodeImage" class="file-label">
        <i class="fas fa-cloud-upload-alt"></i> Choose Image
      </label>
      
      <div class="preview-container">
        <div id="decodePlaceholder" class="preview-placeholder">
          <i class="fas fa-image"></i>
          <p>Image Preview</p>
        </div>
        <img id="decodePreview" class="preview" />
      </div>
      
      <button id="decodeBtn">
        <i class="fas fa-unlock"></i> Decode Message
      </button>
      <p id="decodedMsg"></p>
    </div>
  </div>

  <canvas id="canvas" hidden></canvas>
  
  <script>
    // Create floating particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 30;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        // Random size, position, and animation duration
        const size = Math.random() * 10 + 5;
        const left = Math.random() * 100;
        const animationDuration = Math.random() * 20 + 10;
        const animationDelay = Math.random() * 5;
        
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${left}vw`;
        particle.style.animationDuration = `${animationDuration}s`;
        particle.style.animationDelay = `${animationDelay}s`;
        
        particlesContainer.appendChild(particle);
      }
    }
    
    // Tab switching functionality
    const encodeTab = document.getElementById("encodeTab");
    const decodeTab = document.getElementById("decodeTab");
    const encodeSection = document.getElementById("encodeSection");
    const decodeSection = document.getElementById("decodeSection");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // Switch tabs
    encodeTab.onclick = () => {
      encodeTab.classList.add("active");
      decodeTab.classList.remove("active");
      encodeSection.classList.add("active");
      decodeSection.classList.remove("active");
    };

    decodeTab.onclick = () => {
      decodeTab.classList.add("active");
      encodeTab.classList.remove("active");
      decodeSection.classList.add("active");
      encodeSection.classList.remove("active");
    };

    // Encode functionality
    const encodeInput = document.getElementById("encodeImage");
    const encodePreview = document.getElementById("encodePreview");
    const encodePlaceholder = document.getElementById("encodePlaceholder");
    const encodeBtn = document.getElementById("encodeBtn");
    const secretText = document.getElementById("secretText");

    encodeInput.onchange = e => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e2 => {
          encodePreview.src = e2.target.result;
          encodePreview.style.display = "block";
          encodePlaceholder.style.display = "none";
        };
        reader.readAsDataURL(file);
      }
    };

    encodeBtn.onclick = () => {
      const file = encodeInput.files[0];
      const text = secretText.value;
      if (!file || !text) {
        alert("Please select an image and enter a message!");
        return;
      }

      const img = new Image();
      const reader = new FileReader();
      reader.onload = () => {
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          const imgData = ctx.getImageData(0, 0, img.width, img.height);
          const data = imgData.data;

          const binaryMsg = text
            .split("")
            .map(ch => ch.charCodeAt(0).toString(2).padStart(8, "0"))
            .join("") + "00000011"; // EOF marker

          for (let i = 0; i < binaryMsg.length && i < data.length; i++) {
            data[i] = (data[i] & ~1) | parseInt(binaryMsg[i]);
          }

          ctx.putImageData(imgData, 0, 0);
          const link = document.createElement("a");
          link.download = "encoded_image.png";
          link.href = canvas.toDataURL();
          link.click();
          
          // Add success animation
          encodeBtn.innerHTML = '<i class="fas fa-check"></i> Success! Downloading...';
          encodeBtn.style.background = '#4CAF50';
          setTimeout(() => {
            encodeBtn.innerHTML = '<i class="fas fa-lock"></i> Encode & Download';
            encodeBtn.style.background = '';
          }, 2000);
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    };

    // Decode functionality
    const decodeInput = document.getElementById("decodeImage");
    const decodePreview = document.getElementById("decodePreview");
    const decodePlaceholder = document.getElementById("decodePlaceholder");
    const decodeBtn = document.getElementById("decodeBtn");
    const decodedMsg = document.getElementById("decodedMsg");

    decodeInput.onchange = e => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e2 => {
          decodePreview.src = e2.target.result;
          decodePreview.style.display = "block";
          decodePlaceholder.style.display = "none";
        };
        reader.readAsDataURL(file);
      }
    };

    decodeBtn.onclick = () => {
      const file = decodeInput.files[0];
      if (!file) {
        alert("Please upload an image to decode!");
        return;
      }

      const img = new Image();
      const reader = new FileReader();
      reader.onload = () => {
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          const imgData = ctx.getImageData(0, 0, img.width, img.height);
          const data = imgData.data;

          let binary = "";
          for (let i = 0; i < data.length; i++) binary += (data[i] & 1).toString();

          let message = "";
          for (let i = 0; i < binary.length; i += 8) {
            const byte = binary.slice(i, i + 8);
            if (byte === "00000011") break;
            message += String.fromCharCode(parseInt(byte, 2));
          }

          if (message) {
            decodedMsg.textContent = "🔍 Hidden Message: " + message;
            decodedMsg.style.color = "#5bc0be";
            decodeBtn.innerHTML = '<i class="fas fa-check"></i> Message Decoded!';
            decodeBtn.style.background = '#4CAF50';
            setTimeout(() => {
              decodeBtn.innerHTML = '<i class="fas fa-unlock"></i> Decode Message';
              decodeBtn.style.background = '';
            }, 2000);
          } else {
            decodedMsg.textContent = "❌ No hidden message found in this image.";
            decodedMsg.style.color = "#ff6b6b";
          }
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    };
    
    // Initialize particles when page loads
    window.onload = function() {
      createParticles();
    };
  </script>
</body>
</html>
